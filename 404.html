<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Redirecting — Trading Insights</title>
  <style>
    :root { --bg:#0a0e1a; --text:#e5e7eb; --accent:#f59e0b; }
    body {
      background:var(--bg); color:var(--text);
      font-family:'Segoe UI',system-ui,sans-serif;
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; text-align:center;
      padding:40px 20px;
    }
    .spinner {
      width:48px; height:48px; border:4px solid #1f2937;
      border-top:4px solid var(--accent); border-radius:50%;
      animation:spin 0.8s linear infinite; margin:0 auto 24px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { color:#9ca3af; font-size:14px; margin-top:12px; }
    a { color:var(--accent); }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2 style="color:#f9fafb; font-size:20px;">Redirecting to Play Store…</h2>
  <p id="msg">Opening Trading Insights on Google Play</p>
  <p style="margin-top:24px; font-size:12px;">
    Not redirecting? <a id="fallback" href="https://play.google.com/store/apps/details?id=com.premium.trading_insights.signals">Tap here</a>
  </p>

  <script>
    // ── 404 Referral Redirect ────────────────────────────────────────────────
    // This 404.html catches old referral link paths like:
    //   https://supporttradinginsights-byte.github.io/link/r/ABCD1234
    //
    // GitHub Pages can't do server-side redirects, so any unmatched path
    // lands here. We extract the referral code from the path and redirect
    // to the Play Store with the correct &referrer= parameter so that
    // Play Install Referrer API still delivers the code to the app.
    // ────────────────────────────────────────────────────────────────────────
    (function () {
      var PLAY_BASE = 'https://play.google.com/store/apps/details?id=com.premium.trading_insights.signals';
      var code = null;

      // Extract code from path: /link/r/ABCD1234
      var segs = window.location.pathname.split('/').filter(Boolean);
      var rIdx = segs.indexOf('r');
      if (rIdx !== -1 && segs[rIdx + 1]) {
        var raw = segs[rIdx + 1].trim().toUpperCase();
        if (/^[A-Z0-9]{6,12}$/.test(raw)) {
          code = raw;
        }
      }

      // Also check query param: ?ref=CODE
      if (!code) {
        var params = new URLSearchParams(window.location.search);
        var qRef = params.get('ref');
        if (qRef && /^[A-Z0-9]{6,12}$/.test(qRef.trim().toUpperCase())) {
          code = qRef.trim().toUpperCase();
        }
      }

      var redirectUrl;
      if (code) {
        var referrer = encodeURIComponent('ref=' + code);
        redirectUrl = PLAY_BASE + '&referrer=' + referrer;
        document.getElementById('msg').textContent =
          'Applying referral code: ' + code;
      } else {
        redirectUrl = PLAY_BASE;
      }

      document.getElementById('fallback').href = redirectUrl;

      // Redirect after a short delay so spinner is visible
      setTimeout(function () {
        window.location.replace(redirectUrl);
      }, 800);
    })();
  </script>
</body>
</html>
