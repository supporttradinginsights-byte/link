<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Insights — Download</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0f1e;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #111827;
      border: 1px solid #1e3a5f;
      border-radius: 20px;
      padding: 48px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 88px; height: 88px;
      background: linear-gradient(135deg, #1d8cf8, #3358f4);
      border-radius: 20px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 8px 32px rgba(29,140,248,.35);
    }
    h1 { font-size: 26px; font-weight: 800; margin-bottom: 12px; }
    p  { color: #94a3b8; font-size: 15px; line-height: 1.7; margin-bottom: 32px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #1d8cf8, #3358f4);
      color: #fff;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 4px 20px rgba(29,140,248,.4);
      transition: transform .15s, box-shadow .15s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(29,140,248,.5); }
    .features {
      display: flex;
      gap: 12px;
      margin-top: 32px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .feat {
      background: #0d2137;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      color: #64b5f6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📈</div>
    <h1>Trading Insights</h1>
    <p>Professional forex & crypto trading signals delivered in real-time. Download the app and start trading smarter today.</p>
    <a class="btn" href="https://play.google.com/store/apps/details?id=com.premium.trading_insights.signals">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M3 20.5v-17c0-.83 1-.88 1.4-.44l16 8.5-16 8.5C3.9 21.5 3 21.3 3 20.5z"/>
      </svg>
      Download on Play Store
    </a>
    <div class="features">
      <span class="feat">📊 Live Signals</span>
      <span class="feat">🔔 Push Alerts</span>
      <span class="feat">🤖 EA Copy Trade</span>
      <span class="feat">📈 MT5 Support</span>
    </div>
  </div>
</body>
</html>
